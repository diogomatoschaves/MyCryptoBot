services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./database/local_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
  data-service:
    build:
      context: .
      dockerfile: data/Dockerfile
    image: data-server
    platform: linux/amd64
    ports:
      - "5003:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - APP_NAME=crypto-bot-data
      - MODEL_APP_URL=http://model-service:5000
      - EXECUTION_APP_URL=http://execution-service:5000
      - PORT=5000
      - LOGGER_LEVEL=INFO
      # local dev is http, so the JWT cookie can't be Secure-only
      - JWT_COOKIE_SECURE=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database/model:/usr/src/app/database/model
  model-service:
    build:
      context: .
      dockerfile: model/Dockerfile.web
    image: model-server
    platform: linux/amd64
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - APP_NAME=crypto-bot-model
      - PORT=5000
      - LOGGER_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database/model:/usr/src/app/database/model
      - ./model/strategies/models:/usr/src/app/model/strategies/models
  model-worker:
    build:
      context: .
      dockerfile: model/Dockerfile.worker
    image: model-worker
    platform: linux/amd64
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - EXECUTION_APP_URL=http://execution-service:5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database/model:/usr/src/app/database/model
      - ./model/strategies/models:/usr/src/app/model/strategies/models
  execution-service:
    build:
      context: .
      dockerfile: execution/Dockerfile
    image: execution-server
    platform: linux/amd64
    ports:
      - "5002:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - APP_NAME=crypto-bot-execution
      - PORT=5000
      - LOGGER_LEVEL=DEBUG
      - SNAPSHOTS_INTERVAL=180
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database/model:/usr/src/app/database/model
  redis:
    # Must stay >= the version that wrote the data volume (redis:latest 8.8.0
    # ran in prod before the pin; its RDB v14 file is unreadable by redis 7)
    image: redis:8
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: dashboard-server
    ports:
      # Picks the first free host port in the range (3000 if available)
      - "3000-3010:80"
volumes:
  db:
    driver: local
  redis-data:
    driver: local