server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # forward API calls to the data service so the dashboard and API share an
    # origin (required for the httpOnly JWT cookie). Used by docker-compose;
    # in production the data service serves the dashboard itself.
    location /api/ {
        proxy_pass http://data-service:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
